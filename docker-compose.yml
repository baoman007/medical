version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: medical-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-medical_root_password}
      MYSQL_DATABASE: ${DB_NAME:-medical_ai}
      MYSQL_USER: ${DB_USER:-medical_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-medical_password}
      TZ: Asia/Shanghai
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    # ports:
    #   - "3306:3306"  # 只在容器内访问，不需要映射到宿主机
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-name-resolve
      --max-connections=500
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD:-medical_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-medical_user}
      DB_PASSWORD: ${DB_PASSWORD:-medical_password}
      DB_NAME: ${DB_NAME:-medical_ai}
      DB_CONNECTION_LIMIT: 10
      JWT_SECRET: ${JWT_SECRET:-medical_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 24h
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-medical-v1}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-qwen2.5}
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
      LOG_LEVEL: info
      LOG_DIR: ./logs
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "8080:8080"
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medical-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - medical-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    restart: always
    ports:
      - "443:443"
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - medical-network

volumes:
  mysql-data:
    driver: local
  backend-logs:
    driver: local
  backend-uploads:
    driver: local

networks:
  medical-network:
    driver: bridge
